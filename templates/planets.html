<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Planets</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            background-color: #f4f4f4;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        p {
            color: #666;
            font-size: 18px;
        }
        .box {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .planet-grid {

    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-top: 25px;
    }

    .planet-grid a {
        text-decoration: none;
        color: #333;
    }

    .planet-btn {
        width: 100%;
        max-width: 150px;
        cursor: pointer;
        transition: transform 0.2s;
        border-radius: 50%;  /* makes them look circular if your drawings are round! */
    }

    .planet-btn:hover {
        transform: scale(1.1);  /* planet grows slightly when you hover */
    }

    .back-link {
        display: inline-block;
        margin-top: 25px;
        color: #4CAF50;
        text-decoration: none;
        font-size: 15px;
    }

    .back-link:hover {
        text-decoration: underline;
}

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Pick your planet</h1>
        <p>Your weight on Earth: <strong>{{ weight }} kg</strong></p>
        <p>Click a planet to see how much you'd weigh there!</p>

        <div class="planet-grid">
        {% for planet in ['Mercury', 'Venus', 'Earth', 'Mars', 'Jupiter', 'Saturn', 'Uranus', 'Neptune'] %}
        <a href="/result?weight={{ weight }}&planet={{ planet }}">
            <img
                src="{{ url_for('static', filename=planet.lower() + '.png') }}"
                alt="{{ planet }}"
                class="planet-btn"
            />
            <p>{{ planet }}</p>
        </a>
        {% endfor %}

        </div>

        <a class="back-link" href="/">Change my weight</a>


    </div>
</body>
</html>
